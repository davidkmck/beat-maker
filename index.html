<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cyberpunk Beat Maker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="./beat-maker.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --border: #26263b;
      --dim: #1a1a2e;
      --text: #e2e2e9;
      --text-dim: #6c6c84;
      
      /* Neon Accent Colors */
      --kick: #ff3366;
      --snare: #00e5ff;
      --hihat: #ffee55;
      --clap: #9d4edd;
      --bass: #39ff14;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      padding: 30px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      padding: 25px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, select {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 10px 15px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
    }

    select {
      background-color: var(--dim);
    }

    button:hover, select:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--text-dim);
    }

    .play-btn {
      border-color: var(--snare);
      color: var(--snare);
      font-weight: bold;
    }

    .play-btn.playing {
      background: rgba(0, 229, 255, 0.1);
      text-shadow: 0 0 8px var(--snare);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }

    .save-btn {
      border-color: var(--bass);
      color: var(--bass);
    }
    
    .save-btn:hover {
      background: rgba(57, 255, 20, 0.1);
    }

    .record-btn {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .record-btn.recording {
      border-color: var(--kick);
      color: var(--kick);
      background: rgba(255, 51, 102, 0.15);
      text-shadow: 0 0 8px var(--kick);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .bpm-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--dim);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .bpm-container label {
      color: var(--text-dim);
      font-size: 12px;
    }

    .bpm-container input[type="number"] {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      width: 45px;
      text-align: center;
      outline: none;
    }

    /* Grid Layout - Defaults to Portrait View (Hides Track Controls) */
    .sequencer-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .beat-row {
      display: grid;
      grid-template-columns: 80px 1fr; /* No middle column for track-controls in portrait */
      gap: 15px;
      align-items: center;
    }

    .track-label {
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* Hide Mute and Pan by default on mobile screens/portrait layout */
    .track-controls {
      display: none; 
      align-items: center;
      gap: 10px;
    }

    /* Responsive Override: Only show track controls in landscape mode or on wider tablet/desktop screens */
    @media (orientation: landscape), (min-width: 768px) {
      .beat-row {
        grid-template-columns: 80px 140px 1fr; /* Restores middle column layout */
      }
      .track-controls {
        display: flex; /* Makes sliders and buttons visible */
      }
    }

    .mute-btn {
      background: var(--dim);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 10px;
      padding: 4px 6px;
      width: 50px;
      text-align: center;
      border-radius: 3px;
    }

    .mute-btn.muted {
      background: rgba(255, 51, 102, 0.2);
      border-color: var(--kick);
      color: var(--kick);
      text-shadow: 0 0 6px var(--kick);
    }

    .pan-slider {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: var(--dim);
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
    }

    .pan-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-dim);
      cursor: pointer;
    }
    
    .pan-slider:active::-webkit-slider-thumb {
      background: var(--snare);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 6px;
      width: 100%;
    }

    .step {
      height: 38px;
      background-color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: background-color 0.1s;
    }

    /* Track Specific Color Themes */
    .step.kick.active { background-color: var(--kick); box-shadow: 0 0 10px var(--kick); border-color: #fff; }
    .step.snare.active { background-color: var(--snare); box-shadow: 0 0 10px var(--snare); border-color: #fff; }
    .step.hihat.active { background-color: var(--hihat); box-shadow: 0 0 10px var(--hihat); border-color: #fff; }
    .step.clap.active { background-color: var(--clap); box-shadow: 0 0 10px var(--clap); border-color: #fff; }
    .step.bass.active { background-color: var(--bass); box-shadow: 0 0 10px var(--bass); border-color: #fff; }

    .track-label.kick { color: var(--kick); }
    .track-label.snare { color: var(--snare); }
    .track-label.hihat { color: var(--hihat); }
    .track-label.clap { color: var(--clap); }
    .track-label.bass { color: var(--bass); }

    /* Moving Timeline Playback Cursor */
    .cursor-timeline {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.04);
      border-left: 1px dashed rgba(0, 229, 255, 0.4);
      border-right: 1px dashed rgba(0, 229, 255, 0.4);
      pointer-events: none;
      transition: left 0.05s linear;
      display: none;
      border-radius: 4px;
    }

    footer {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 950px;
      color: var(--text-dim);
      font-size: 12px;
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .menus-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .menu-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-group strong {
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>BEAT_MAKER//_</h1>
      <div class="controls">
        <div class="bpm-container">
          <label for="bpm">BPM</label>
          <input type="number" id="bpm" value="120" min="60" max="200">
        </div>
        <button class="play-btn" id="playBtn">▶ PLAY</button>
        <button class="clear-btn" id="clearBtn">CLEAR</button>
        <button class="save-btn" id="saveBtn">💾 SAVE BEAT</button>
        <button class="record-btn" id="recordBtn">EXPORT WAV</button>
      </div>
    </header>

    <div class="sequencer-grid">
      <div id="grid"></div>
      <div class="cursor-timeline" id="cursor"></div>
    </div>
  </div>

  <footer>
    <div class="footer-top">
      <div>STATUS: READY</div>
      
      <div class="menus-container">
        <div class="menu-group">
          <strong>FACTORY BANK:</strong>
          <select id="factorySelect">
            <option value="" disabled selected>CHOOSE GENRE...</option>
            <option value="techno">TECHNO_01</option>
            <option value="house">HOUSE_02</option>
            <option value="hiphop">HIP_HOP_03</option>
            <option value="synthwave">SYNTHWAVE_04</option>
            <option value="chill">AMB_CHILL</option>
          </select>
        </div>

        <div class="menu-group" id="customPresetsSection" style="display: none;">
          <strong>USER MEMORY:</strong>
          <select id="customSelect">
            </select>
        </div>
      </div>
      
    </div>
  </footer>

  <script>
    const TRACKS = [
      { id: 'kick',  label: 'KICK',   color: 'kick'  },
      { id: 'snare', label: 'SNARE',  color: 'snare' },
      { id: 'hihat', label: 'HI-HAT', color: 'hihat' },
      { id: 'clap',  label: 'CLAP',   color: 'clap'  },
      { id: 'bass',  label: 'BASS',   color: 'bass'  },
    ];
    const STEPS = 16;
    let bpm = 120;
    let isPlaying = false;
    let currentStep = 0;
    let stepInterval = null;

    let grid = TRACKS.map(() => Array(STEPS).fill(false));

    // Web Audio Variables
    let synths = {};
    let channels = {};
    let recorder = null;
    let isRecording = false;

    function initAudio() {
      if (synths.kick) return; 

      const reverb = new Tone.Reverb({ decay: 1.4, wet: 0.15 }).toDestination();
      const delay = new Tone.FeedbackDelay("16n", 0.2).connect(reverb);
      
      recorder = new Tone.Recorder();
      Tone.Destination.connect(recorder);

      TRACKS.forEach(track => {
        channels[track.id] = new Tone.Channel().toDestination();
        if (track.id === 'clap' || track.id === 'bass') {
          channels[track.id].connect(delay);
        } else {
          channels[track.id].connect(reverb);
        }
      });

      synths.kick = new Tone.MembraneSynth({
        pitchDecay: 0.08, octaves: 8, envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.1 }, volume: 3,
      }).connect(channels.kick);

      synths.snare = new Tone.NoiseSynth({
        noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.18, sustain: 0, release: 0.05 }, volume: -3,
      }).connect(channels.snare);

      synths.hihat = new Tone.MetalSynth({
        frequency: 450, envelope: { attack: 0.001, decay: 0.05, release: 0.01 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5, volume: -9,
      }).connect(channels.hihat);

      synths.clap = new Tone.NoiseSynth({
        noise: { type: 'pink' }, envelope: { attack: 0.005, decay: 0.12, sustain: 0, release: 0.05 }, volume: -5,
      }).connect(channels.clap);

      synths.bass = new Tone.Synth({
        oscillator: { type: 'sawtooth' }, envelope: { attack: 0.01, decay: 0.25, sustain: 0.1, release: 0.1 }, volume: -7,
      }).connect(channels.bass);
    }

    function playTrackSound(trackId) {
      if (!synths.kick) return;
      if (trackId === 'kick') synths.kick.triggerAttackRelease('C1', '8n');
      else if (trackId === 'snare') synths.snare.triggerAttackRelease('8n');
      else if (trackId === 'hihat') synths.hihat.triggerAttackRelease('32n');
      else if (trackId === 'clap') synths.clap.triggerAttackRelease('16n');
      else if (trackId === 'bass') {
        const synthNotes = ['C1', 'C1', 'Eb1', 'F1', 'G1', 'Bb1'];
        const randomNote = synthNotes[Math.floor(Math.random() * synthNotes.length)];
        synths.bass.triggerAttackRelease(randomNote, '16n');
      }
    }

    function buildGridUI() {
      const container = document.getElementById('grid');
      container.innerHTML = '';
      
      TRACKS.forEach((track, ti) => {
        const row = document.createElement('div');
        row.className = 'beat-row';
        
        const label = document.createElement('div');
        label.className = `track-label ${track.color}`;
        label.textContent = track.label;
        row.appendChild(label);

        const ctrlWrapper = document.createElement('div');
        ctrlWrapper.className = 'track-controls';

        const muteBtn = document.createElement('button');
        muteBtn.className = 'mute-btn';
        muteBtn.textContent = channels[track.id]?.mute ? 'MUTED' : 'MUTE';
        if(channels[track.id]?.mute) muteBtn.classList.add('muted');
        
        muteBtn.addEventListener('click', () => {
          initAudio();
          const currentlyMuted = !channels[track.id].mute;
          channels[track.id].mute = currentlyMuted;
          muteBtn.classList.toggle('muted', currentlyMuted);
          muteBtn.textContent = currentlyMuted ? 'MUTED' : 'MUTE';
        });

        const panSlider = document.createElement('input');
        panSlider.type = 'range';
        panSlider.className = 'pan-slider';
        panSlider.min = '-1';
        panSlider.max = '1';
        panSlider.step = '0.1';
        panSlider.value = channels[track.id] ? channels[track.id].pan.value : '0';
        panSlider.addEventListener('input', (e) => {
          initAudio();
          channels[track.id].pan.value = parseFloat(e.target.value);
        });

        ctrlWrapper.appendChild(muteBtn);
        ctrlWrapper.appendChild(panSlider);
        row.appendChild(ctrlWrapper);

        const stepsContainer = document.createElement('div');
        stepsContainer.className = 'steps';
        
        for (let si = 0; si < STEPS; si++) {
          const stepElement = document.createElement('div');
          stepElement.className = `step ${track.color}`;
          if (grid[ti][si]) stepElement.classList.add('active');
          
          stepElement.addEventListener('click', () => {
            grid[ti][si] = !grid[ti][si];
            stepElement.classList.toggle('active', grid[ti][si]);
            if (grid[ti][si]) {
              initAudio();
              Tone.start();
              playTrackSound(track.id);
            }
          });
          stepsContainer.appendChild(stepElement);
        }
        row.appendChild(stepsContainer);
        container.appendChild(row);
      });
    }

    function updateCursorPosition() {
      const cursor = document.getElementById('cursor');
      if (!isPlaying) {
        cursor.style.display = 'none';
        return;
      }
      
      const rowElement = document.querySelector('.beat-row');
      if (!rowElement) return;

      const stepsContainer = rowElement.querySelector('.steps');
      const stepElements = stepsContainer.querySelectorAll('.step');
      const sampleStep = stepElements[currentStep];

      const startOffset = sampleStep.offsetLeft;
      const widthSize = sampleStep.offsetWidth;

      cursor.style.display = 'block';
      cursor.style.left = `${startOffset}px`;
      cursor.style.width = `${widthSize}px`;
    }

    function tick() {
      TRACKS.forEach((track, ti) => {
        if (grid[ti][currentStep]) {
          playTrackSound(track.id);
        }
      });

      updateCursorPosition();
      currentStep = (currentStep + 1) % STEPS;
    }

    function startStopSequencer() {
      if (!isPlaying) {
        Tone.start();
        initAudio();
        
        bpm = parseInt(document.getElementById('bpm').value) || 120;
        const speedInterval = (60 / bpm / 4) * 1000;
        
        currentStep = 0;
        tick();
        stepInterval = setInterval(tick, speedInterval);
        isPlaying = true;
        
        document.getElementById('playBtn').textContent = '■ STOP';
        document.getElementById('playBtn').classList.add('playing');
      } else {
        clearInterval(stepInterval);
        isPlaying = false;
        currentStep = 0;
        updateCursorPosition();
        
        document.getElementById('playBtn').textContent = '▶ PLAY';
        document.getElementById('playBtn').classList.remove('playing');
        
        if (isRecording) handleWavExport();
      }
    }

    async function handleWavExport() {
      initAudio();
      const recBtn = document.getElementById('recordBtn');

      if (!isRecording) {
        isRecording = true;
        recBtn.textContent = 'REC...';
        recBtn.classList.add('recording');
        recorder.start();
        if (!isPlaying) startStopSequencer();
      } else {
        isRecording = false;
        recBtn.textContent = 'EXPORT WAV';
        recBtn.classList.remove('recording');
        
        const audioRecording = await recorder.stop();
        const outputUrl = URL.createObjectURL(audioRecording);
        
        const downloadAnchor = document.createElement('a');
        downloadAnchor.download = 'cyberpunk-beat.wav';
        downloadAnchor.href = outputUrl;
        downloadAnchor.click();
      }
    }

    // --- Save System Logic ---
    function saveCustomPreset() {
      const name = prompt("Enter a name for your custom pattern:");
      if (!name) return;
      
      const formattedName = name.toUpperCase().replace(/\s+/g, '_');
      const savedPresets = JSON.parse(localStorage.getItem('custom_presets')) || {};
      
      savedPresets[formattedName] = {
        bpm: parseInt(document.getElementById('bpm').value) || 120,
        grid: grid
      };
      
      localStorage.setItem('custom_presets', JSON.stringify(savedPresets));
      loadCustomPresetsMenu();
      
      // Auto-select the newly saved layout inside the select menu dropdown
      document.getElementById('customSelect').value = formattedName;
    }

    function loadCustomPresetsMenu() {
      const savedPresets = JSON.parse(localStorage.getItem('custom_presets')) || {};
      const section = document.getElementById('customPresetsSection');
      const selectDropdown = document.getElementById('customSelect');
      
      const keys = Object.keys(savedPresets);
      if (keys.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'flex';
      selectDropdown.innerHTML = '<option value="" disabled selected>CHOOSE SAVED...</option>';
      
      keys.forEach((key) => {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = key;
        selectDropdown.appendChild(option);
      });
    }

    // Interactive Button Binding Listeners
    document.getElementById('playBtn').addEventListener('click', startStopSequencer);
    document.getElementById('recordBtn').addEventListener('click', handleWavExport);
    document.getElementById('saveBtn').addEventListener('click', saveCustomPreset);
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      grid = TRACKS.map(() => Array(STEPS).fill(false));
      document.getElementById('factorySelect').value = "";
      const customSelect = document.getElementById('customSelect');
      if(customSelect) customSelect.value = "";
      buildGridUI();
    });

    document.getElementById('bpm').addEventListener('change', (e) => {
      bpm = parseInt(e.target.value) || 120;
      if (isPlaying) {
        clearInterval(stepInterval);
        const speedInterval = (60 / bpm / 4) * 1000;
        stepInterval = setInterval(tick, speedInterval);
      }
    });

    // Combo Box Event Listeners (Factory System)
    document.getElementById('factorySelect').addEventListener('change', (e) => {
      const selection = e.target.value;
      
      // Reset the user preset dropdown layout selection if chosen
      const userSelect = document.getElementById('customSelect');
      if (userSelect) userSelect.value = "";

      if (selection === 'techno') {
        document.getElementById('bpm').value = 126; bpm = 126;
        grid = [
          [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
          [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, true],
          [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false],
          [true, true, false, true, false, true, false, false, true, false, true, false, false, true, false, false]
        ];
      } else if (selection === 'house') {
        document.getElementById('bpm').value = 120; bpm = 120;
        grid = [
          [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
          [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
          [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
          [false, false, true, false, false, false, false, true, false, true, false, false, false, false, true, false]
        ];
      } else if (selection === 'hiphop') {
        document.getElementById('bpm').value = 90; bpm = 90;
        grid = [
          [true, false, false, false, false, false, false, true, false, true, true, false, false, false, false, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, true],
          [true, false, true, false, true, false, true, true, true, false, true, false, true, false, true, false],
          [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false],
          [true, false, false, false, false, false, false, false, false, true, false, false, false, false, false, false]
        ];
      } else if (selection === 'synthwave') {
        document.getElementById('bpm').value = 115; bpm = 115;
        grid = [
          [true, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
          [true, true, true, true, true, true, true, true, true, true, true, true, true, true, true, true],
          [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
          [true, false, true, false, true, false, true, false, true, false, true, false, true, false, true, false]
        ];
      } else if (selection === 'chill') {
        document.getElementById('bpm').value = 95; bpm = 95;
        grid = [
          [true, false, false, false, false, false, true, false, false, true, false, false, false, false, false, false],
          [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false],
          [true, true, false, true, true, false, true, false, true, true, false, true, true, false, true, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, false, false, true, false],
          [true, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false]
        ];
      }
      buildGridUI();
    });

    // Combo Box Event Listeners (User Memory)
    document.getElementById('customSelect').addEventListener('change', (e) => {
      const savedPresets = JSON.parse(localStorage.getItem('custom_presets')) || {};
      const selection = e.target.value;
      if (!savedPresets[selection]) return;

      // Reset factory selection visual index
      document.getElementById('factorySelect').value = "";

      document.getElementById('bpm').value = savedPresets[selection].bpm;
      bpm = savedPresets[selection].bpm;
      grid = savedPresets[selection].grid;
      buildGridUI();
    });

    // Recalculate timeline cursor whenever device rotates to fix styling offsets
    window.addEventListener('resize', updateCursorPosition);

    // Render workspace on boot
    buildGridUI();
    loadCustomPresetsMenu();
  </script>
</body>
</html>
